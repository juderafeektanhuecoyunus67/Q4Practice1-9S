<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice1</title>
</head>
<body>
    <h1>Javascript Conditional Statements</h1>

    <input type="text" id="Age" class="form-control" placeholder="type here...">
    <button class="btn btn-info" onclick="checkAge()">Check</button>
    
    <script>
       //checkAge 
       function checkAge(){
       
        var age = document.getElementById("Age").value;

       if(isNaN(age) || age < 0){
        alert("Please input a valid number.");
       }
       else if (age < 18){
        alert("You are a minor.");
       }
       else if(age > 18){
        alert("You are a legal of age.");
       }
       else {
        alert("You age could not be classified.");
       }
    }
    </script>

</body>
</html>
