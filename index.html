<body>
    <h1>Javascript Conditional Statements</h1>
    <button class="btn btn-info" onclick="checkAge()"></button>
    
    <script>
       //checkAge 
       function checkAge(){
       if (19 < 18){
        alert("You are a minor.");
       }
       else if(21 > 18){
        alert("You are a legal of age.");
       }
       else {
        alert("You age could not be classified.");
       }
    }
    </script>
